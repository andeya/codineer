name: Nightly Release

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-changes:
    name: Check for changes
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check if main has new commits in last 24h
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — force build"
            exit 0
          fi
          last=$(git log -1 --format=%ct HEAD)
          cutoff=$(( $(date +%s) - 86400 ))
          if [ "$last" -gt "$cutoff" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "New commits found — will build"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No new commits in last 24h — skipping build"
          fi

  build:
    name: Nightly (${{ matrix.target }})
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2

      - name: Set nightly channel
        run: echo "nightly" > RELEASE_CHANNEL
        shell: bash

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: bunx tauri
          args: --target ${{ matrix.target }}
          includeUpdaterJson: false
          uploadPlainBinary: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aineer-nightly-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/msi/*.msi

  release:
    name: Publish Nightly
    needs: [check-changes, build]
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Aineer Nightly"
          prerelease: true
          generate_release_notes: false
          body: |
            Automated nightly build from `main` branch.
            **Warning:** This is an unstable development build.
          files: |
            **/*.dmg
            **/*.AppImage
            **/*.deb
            **/*.exe
            **/*.msi
