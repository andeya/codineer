name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  determine-channel:
    name: Determine Release Channel
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.channel.outputs.channel }}
      version: ${{ steps.channel.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Determine channel from tag
        id: channel
        run: |
          channel=$(cat RELEASE_CHANNEL)
          version=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          tag="${GITHUB_REF_NAME}"

          echo "Channel: ${channel}, Version: ${version}, Tag: ${tag}"

          if [[ "$channel" == "stable" && "$tag" != "v${version}" ]]; then
            echo "::error::Tag ${tag} does not match stable version v${version}"
            exit 1
          fi
          if [[ "$channel" == "preview" && "$tag" != "v${version}-pre" ]]; then
            echo "::error::Tag ${tag} does not match preview version v${version}-pre"
            exit 1
          fi

          echo "channel=${channel}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build (${{ matrix.target }})
    needs: determine-channel
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - uses: oven-sh/setup-bun@v2

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev

      - name: Install frontend deps
        run: bun install --frozen-lockfile

      # Build only here; release assets are attached in the `release` job so we
      # publish installer archives only (not .app bundle internals as loose files).
      - name: Build with Tauri
        uses: tauri-apps/tauri-action@v0
        with:
          tauriScript: bunx tauri
          args: --target ${{ matrix.target }}
          includeUpdaterJson: false
          uploadPlainBinary: false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aineer-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            target/${{ matrix.target }}/release/bundle/deb/*.deb
            target/${{ matrix.target }}/release/bundle/nsis/*.exe
            target/${{ matrix.target }}/release/bundle/msi/*.msi

  release:
    name: Create Release
    needs: [determine-channel, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ needs.determine-channel.outputs.channel == 'preview' }}
          generate_release_notes: true
          # Only final installers — never `**/*` (would attach every file inside .app bundles).
          files: |
            **/*.dmg
            **/*.AppImage
            **/*.deb
            **/*.exe
            **/*.msi
