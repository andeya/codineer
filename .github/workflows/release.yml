name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross (Linux cross-compilation)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build release binary
        run: ${{ matrix.cross && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: Determine binary path
        id: bin
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            echo "path=target/${{ matrix.target }}/release/codineer.exe" >> "$GITHUB_OUTPUT"
            echo "name=codineer.exe" >> "$GITHUB_OUTPUT"
          else
            echo "path=target/${{ matrix.target }}/release/codineer" >> "$GITHUB_OUTPUT"
            echo "name=codineer" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          staging="codineer-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "${{ steps.bin.outputs.path }}" "$staging/"
          cp LICENSE README.md "$staging/" 2>/dev/null || true
          tar czf "$staging.tar.gz" "$staging"
          echo "ASSET=$staging.tar.gz" >> "$GITHUB_ENV"

      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: bash
        run: |
          staging="codineer-${{ github.ref_name }}-${{ matrix.target }}"
          mkdir -p "$staging"
          cp "${{ steps.bin.outputs.path }}" "$staging/"
          cp LICENSE README.md "$staging/" 2>/dev/null || true
          7z a "$staging.zip" "$staging"
          echo "ASSET=$staging.zip" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: codineer-${{ matrix.target }}
          path: ${{ env.ASSET }}

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*

  publish-crate:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish codineer-cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p codineer-cli --locked
        continue-on-error: true

  update-homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256 checksums
        run: |
          for target in x86_64-apple-darwin aarch64-apple-darwin x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu; do
            archive="codineer-${{ github.ref_name }}-${target}.tar.gz"
            url="https://github.com/andeya/codineer/releases/download/${{ github.ref_name }}/${archive}"
            sha=$(curl -sL "$url" | sha256sum | cut -d' ' -f1)
            key=$(echo "$target" | tr '-' '_')
            echo "sha_${key}=${sha}" >> "$GITHUB_ENV"
          done

      - name: Check out Homebrew tap repo
        uses: actions/checkout@v4
        with:
          repository: andeya/homebrew-codineer
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="${{ github.ref_name }}"
          mkdir -p Formula
          cat > Formula/codineer.rb << FORMULA
          class Codineer < Formula
            desc "Local coding-agent CLI implemented in safe Rust"
            homepage "https://github.com/andeya/codineer"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/andeya/codineer/releases/download/${TAG}/codineer-${TAG}-aarch64-apple-darwin.tar.gz"
                sha256 "${sha_aarch64_apple_darwin}"
              else
                url "https://github.com/andeya/codineer/releases/download/${TAG}/codineer-${TAG}-x86_64-apple-darwin.tar.gz"
                sha256 "${sha_x86_64_apple_darwin}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/andeya/codineer/releases/download/${TAG}/codineer-${TAG}-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_aarch64_unknown_linux_gnu}"
              else
                url "https://github.com/andeya/codineer/releases/download/${TAG}/codineer-${TAG}-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "${sha_x86_64_unknown_linux_gnu}"
              end
            end

            def install
              bin.install "codineer"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/codineer --version")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/codineer.rb
          git diff --cached --quiet && exit 0
          git commit -m "formula: bump to ${{ github.ref_name }}"
          git push
        continue-on-error: true
