<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link id="favicon" rel="icon" type="image/svg+xml" href="/logo-dark.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aineer</title>
  <script>
    (function(){
      try {
        var cfg = localStorage.getItem('aineer-theme-config');
        if (cfg) {
          var parsed = JSON.parse(cfg);
          var mode = parsed.mode;
          if (mode === 'light') return;
          if (mode === 'dark') { document.documentElement.classList.add('dark'); return; }
        }
        var legacy = localStorage.getItem('aineer-theme');
        if (legacy === 'light') return;
        if (legacy && legacy !== 'system' && legacy !== 'dark') {
          if (legacy === 'github-light' || legacy === 'solarized-light') return;
        }
        if (!window.matchMedia('(prefers-color-scheme: dark)').matches) return;
        document.documentElement.classList.add('dark');
      } catch(e) { document.documentElement.classList.add('dark'); }
    })();
  </script>
  <script>
    (function(){
      var isDark = document.documentElement.classList.contains('dark');
      var link = document.getElementById('favicon');
      if (link) link.href = isDark ? '/logo-dark.svg' : '/logo-light.svg';
    })();
  </script>
  <style>
    :root {
      --splash-bg: #ffffff;
      --splash-text: #0f172a;
      --splash-dot: #6366f1;
    }
    .dark {
      --splash-bg: #0f1117;
      --splash-text: #e4e4ec;
      --splash-dot: #6366f1;
    }
    #splash{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;gap:1.25rem;background:var(--splash-bg)}
    #splash svg{width:64px;height:64px;animation:pulse 2s ease-in-out infinite}
    #splash .logo-dark{display:none}
    #splash .logo-light{display:block}
    .dark #splash .logo-dark{display:block}
    .dark #splash .logo-light{display:none}
    #splash .name{font-size:1.125rem;font-weight:600;color:var(--splash-text);letter-spacing:0.02em;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif}
    #splash .dots{display:flex;gap:6px}
    #splash .dots span{width:5px;height:5px;border-radius:50%;background:var(--splash-dot);animation:blink 1.4s ease-in-out infinite}
    #splash .dots span:nth-child(2){animation-delay:0.2s}
    #splash .dots span:nth-child(3){animation-delay:0.4s}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.7;transform:scale(.96)}}
    @keyframes blink{0%,80%,100%{opacity:.25}40%{opacity:1}}
  </style>
</head>
<body>
  <div id="root">
    <div id="splash">
      <svg class="logo-dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <defs>
          <linearGradient id="sbg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#0F172A"/><stop offset="100%" stop-color="#1E293B"/>
          </linearGradient>
          <linearGradient id="sg" x1="256" y1="20" x2="256" y2="493" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FDE68A"/><stop offset="100%" stop-color="#67E8F9"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="108" fill="url(#sbg)"/>
        <rect x="1" y="1" width="510" height="510" rx="107" fill="none" stroke="rgba(100,116,139,0.08)" stroke-width="1"/>
        <line x1="200" y1="349" x2="90" y2="493" stroke="url(#sg)" stroke-width="13" stroke-linecap="round"/>
        <line x1="312" y1="349" x2="422" y2="493" stroke="url(#sg)" stroke-width="13" stroke-linecap="round"/>
        <line x1="132" y1="438" x2="380" y2="438" stroke="url(#sg)" stroke-width="13" stroke-linecap="round"/>
        <rect x="68" y="92" width="377" height="233" rx="55" fill="none" stroke="url(#sg)" stroke-width="34"/>
        <circle cx="256" cy="30.5" r="10.5" fill="url(#sg)"/>
        <line x1="256" y1="41" x2="256" y2="92" stroke="url(#sg)" stroke-width="13" stroke-linecap="round"/>
        <line x1="34" y1="209" x2="68" y2="209" stroke="url(#sg)" stroke-width="13" stroke-linecap="round"/>
        <line x1="445" y1="209" x2="479" y2="209" stroke="url(#sg)" stroke-width="13" stroke-linecap="round"/>
        <path d="M167 181.5 L201 209 L167 236.5" fill="none" stroke="url(#sg)" stroke-width="21" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="328" y1="181.5" x2="328" y2="236.5" stroke="url(#sg)" stroke-width="21" stroke-linecap="round"/>
      </svg>
      <svg class="logo-light" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <defs>
          <linearGradient id="slbg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#FAFAF9"/><stop offset="100%" stop-color="#F5F5F4"/>
          </linearGradient>
          <linearGradient id="slg" x1="256" y1="20" x2="256" y2="493" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#1E1B4B"/><stop offset="45%" stop-color="#7C3AED"/><stop offset="100%" stop-color="#06B6D4"/>
          </linearGradient>
        </defs>
        <rect width="512" height="512" rx="108" fill="url(#slbg)"/>
        <rect x="1" y="1" width="510" height="510" rx="107" fill="none" stroke="rgba(49,46,129,0.06)" stroke-width="1"/>
        <line x1="200" y1="349" x2="90" y2="493" stroke="url(#slg)" stroke-width="13" stroke-linecap="round"/>
        <line x1="312" y1="349" x2="422" y2="493" stroke="url(#slg)" stroke-width="13" stroke-linecap="round"/>
        <line x1="132" y1="438" x2="380" y2="438" stroke="url(#slg)" stroke-width="13" stroke-linecap="round"/>
        <rect x="68" y="92" width="377" height="233" rx="55" fill="none" stroke="url(#slg)" stroke-width="34"/>
        <circle cx="256" cy="30.5" r="10.5" fill="url(#slg)"/>
        <line x1="256" y1="41" x2="256" y2="92" stroke="url(#slg)" stroke-width="13" stroke-linecap="round"/>
        <line x1="34" y1="209" x2="68" y2="209" stroke="url(#slg)" stroke-width="13" stroke-linecap="round"/>
        <line x1="445" y1="209" x2="479" y2="209" stroke="url(#slg)" stroke-width="13" stroke-linecap="round"/>
        <path d="M167 181.5 L201 209 L167 236.5" fill="none" stroke="url(#slg)" stroke-width="21" stroke-linecap="round" stroke-linejoin="round"/>
        <line x1="328" y1="181.5" x2="328" y2="236.5" stroke="url(#slg)" stroke-width="21" stroke-linecap="round"/>
      </svg>
      <div class="name">Aineer</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
  </div>
  <script type="module" src="/ui/main.tsx"></script>
</body>
</html>
