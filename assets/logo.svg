<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="a-grad" x1="128" y1="64" x2="384" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="45%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#13132B"/>
      <stop offset="100%" stop-color="#0D0D1F"/>
    </linearGradient>
    <filter id="a-glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="108" fill="url(#bg-grad)"/>
  <rect x="2" y="2" width="508" height="508" rx="106" fill="none" stroke="rgba(99,102,241,0.12)" stroke-width="1.5"/>

  <g filter="url(#a-glow)">
    <path d="
      M 256 72
      L 440 432 L 358 432 L 310 320 L 202 320 L 154 432 L 72 432 Z
      M 256 186 L 216 292 L 296 292 Z
    " fill="url(#a-grad)" fill-rule="evenodd"/>
  </g>

  <circle cx="330" cy="302" r="9" fill="#FBBF24" opacity="0.85">
    <animate attributeName="opacity" values="0.85;0.15;0.85" dur="1.2s" repeatCount="indefinite"/>
  </circle>
</svg>
