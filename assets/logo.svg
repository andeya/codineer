<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="gem" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="gem-shine" x1="256" y1="40" x2="256" y2="350" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="rgba(255,255,255,0.20)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="drop">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#4338CA" flood-opacity="0.3"/>
    </filter>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="103" y="103" width="306" height="306" rx="22" ry="22"
        transform="rotate(45, 256, 256)"
        fill="url(#gem)" filter="url(#drop)"/>

  <rect x="103" y="103" width="306" height="306" rx="22" ry="22"
        transform="rotate(45, 256, 256)"
        fill="url(#gem-shine)"/>

  <rect x="118" y="118" width="276" height="276" rx="18" ry="18"
        transform="rotate(45, 256, 256)"
        fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5"/>

  <g filter="url(#glow)">
    <path d="M 152 192 L 262 260 L 152 328"
          stroke="rgba(255,255,255,0.95)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <rect x="290" y="300" width="80" height="22" rx="5" fill="url(#amber)">
    <animate attributeName="opacity" values="1;0.2;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
